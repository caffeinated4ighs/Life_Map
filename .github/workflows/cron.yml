name: Life Map — Daily Cron

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC — health ping (keeps Supabase alive)
    - cron: '30 11 * * *'  # 11:30 UTC — morning run
    - cron: '30 3 * * *'   # 03:30 UTC — EOD run (adjust for your timezone)
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  health:
    name: Health ping
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 12 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m orchestrator health
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL_ID: ${{ secrets.GROQ_MODEL_ID }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          HEALTH_CHECK_PATH: ${{ secrets.HEALTH_CHECK_PATH }}

  morning:
    name: Morning run
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 11 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m orchestrator morning
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL_ID: ${{ secrets.GROQ_MODEL_ID }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          HEALTH_CHECK_PATH: ${{ secrets.HEALTH_CHECK_PATH }}

  eod:
    name: EOD run
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 3 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m orchestrator eod
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL_ID: ${{ secrets.GROQ_MODEL_ID }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          HEALTH_CHECK_PATH: ${{ secrets.HEALTH_CHECK_PATH }}